name: Build Custom Studio Docker Image

on:
  push:
    paths:
      - '.github/workflows/build-studio.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Supabase Repository
        uses: actions/checkout@v4
        with:
          repository: supabase/supabase
          # Checkout the commit matching 2026.03.04-sha-0043607
          ref: 00436076bbd542f8e9593ae13811dee1cf353f19
          path: supabase

      - name: Patch AuthLayout UI to show all Auth configuration menus
        run: |
          # Replace IS_PLATFORM with true only in the Auth sidebar menu file
          # This shows hidden Auth menus (Sign In / Providers, Sessions, Auth Hooks, etc.)
          # without affecting the rest of the app (especially API_URL computation)
          sed -i "s/IS_PLATFORM/true/g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts
          # Clean up the now-unused import from the patched file
          sed -i "s/import { true } from 'lib\/constants'//g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts
          echo "=== Patched file preview ==="
          head -5 supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts

      - name: Create missing Auth Config API route
        run: |
          mkdir -p supabase/apps/studio/pages/api/platform/auth/\[ref\]
          cat << 'EOF' > supabase/apps/studio/pages/api/platform/auth/\[ref\]/config.ts
          import { NextApiRequest, NextApiResponse } from 'next'

          export default async function handler(req: NextApiRequest, res: NextApiResponse) {
            if (req.method === 'GET') {
              return res.status(200).json({
                OAUTH_SERVER_ENABLED: process.env.GOTRUE_OAUTH_SERVER_ENABLED === 'true',
                OAUTH_SERVER_ALLOW_DYNAMIC_REGISTRATION: process.env.GOTRUE_OAUTH_SERVER_ALLOW_DYNAMIC_REGISTRATION === 'true',
                EXTERNAL_ANONYMOUS_USERS_ENABLED: process.env.GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED !== 'false',
                EXTERNAL_EMAIL_ENABLED: process.env.GOTRUE_EXTERNAL_EMAIL_ENABLED !== 'false',
                EXTERNAL_GOOGLE_ENABLED: process.env.GOTRUE_EXTERNAL_GOOGLE_ENABLED === 'true',
                EXTERNAL_APPLE_ENABLED: process.env.GOTRUE_EXTERNAL_APPLE_ENABLED === 'true',
                EXTERNAL_GITHUB_ENABLED: process.env.GOTRUE_EXTERNAL_GITHUB_ENABLED === 'true',
                EXTERNAL_DISCORD_ENABLED: process.env.GOTRUE_EXTERNAL_DISCORD_ENABLED === 'true',
                EXTERNAL_TWITTER_ENABLED: process.env.GOTRUE_EXTERNAL_TWITTER_ENABLED === 'true',
                MAILER_AUTOCONFIRM: process.env.GOTRUE_MAILER_AUTOCONFIRM === 'true',
                SMTP_ADMIN_EMAIL: process.env.GOTRUE_SMTP_ADMIN_EMAIL || '',
                SMTP_HOST: process.env.GOTRUE_SMTP_HOST || '',
                SMTP_PORT: process.env.GOTRUE_SMTP_PORT || '',
                SMTP_USER: process.env.GOTRUE_SMTP_USER || '',
                SMTP_PASS: process.env.GOTRUE_SMTP_PASS || '',
                SMTP_SENDER_NAME: process.env.GOTRUE_SMTP_SENDER_NAME || '',
                RATE_LIMIT_EMAIL_SENT: parseInt(process.env.GOTRUE_RATE_LIMIT_EMAIL_SENT || '30', 10),
                SITE_URL: process.env.GOTRUE_SITE_URL || process.env.SUPABASE_PUBLIC_URL || '',
                URI_ALLOW_LIST: process.env.GOTRUE_URI_ALLOW_LIST || '',
                JWT_EXP: parseInt(process.env.GOTRUE_JWT_EXP || '3600', 10),
              })
            }
            
            if (req.method === 'PATCH') {
              // Note: Modifying env vars in node doesn't persist to docker-compose
              // We return success so the UI doesn't crash, but actual persistence requires Dokploy env changes
              return res.status(200).json({ success: true, message: "Configuration mock updated" })
            }
            
            return res.status(405).json({ error: 'Method not allowed' })
          }
          EOF

      - name: Patch Dockerfile to accept NEXT_PUBLIC build args
        run: |
          # Insert ARG declarations before the RUN pnpm build line so Next.js sees them
          sed -i 's/RUN pnpm --filter studio exec next build/ARG NEXT_PUBLIC_API_URL=http:\/\/localhost:3000\/api\nENV NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL\nRUN pnpm --filter studio exec next build/' supabase/apps/studio/Dockerfile

      - name: Get lower case owner name
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./supabase
          file: ./supabase/apps/studio/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/sb-studio:custom
          target: production
          # Provide a dummy API URL at build time so Next.js static prerendering
          # of IS_PLATFORM=false pages doesn't crash with "Invalid URL".
          # The real value is set at runtime via docker-compose environment variables.
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3000/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
