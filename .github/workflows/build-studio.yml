name: Build Custom Studio Docker Image

on:
  push:
    paths:
      - '.github/workflows/build-studio.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Supabase Repository
        uses: actions/checkout@v4
        with:
          repository: supabase/supabase
          # Checkout the commit matching 2026.03.04-sha-0043607 to avoid regressions
          ref: 00436076bbd542f8e9593ae13811dee1cf353f19
          path: supabase

      - name: Patch AuthLayout UI to bypass IS_PLATFORM
        run: |
          # Patch AuthLayout menus to bypass IS_PLATFORM checks without breaking Next.js API_URL
          sed -i "s/IS_PLATFORM/true/g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts
          sed -i "s/import { true } from 'lib\/constants'/ /g" supabase/apps/studio/components/layouts/AuthLayout/AuthLayout.utils.ts

      - name: Get lower case owner name
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./supabase
          file: ./supabase/apps/studio/Dockerfile
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.owner }}/sb-studio:custom
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max
